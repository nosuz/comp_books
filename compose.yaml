services:
  web:
    image: amazon_scrape:latest
    build:
      context: .
    logging:
      driver: syslog
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      TZ: Asia/Tokyo
      AMAZON_AFFILIATE_TAG: postcardst-22
    volumes:
      - ./data:/app/data
    ports:
      - "7000:7000"
    restart: unless-stopped

  update:
    image: amazon_scrape:latest
    logging:
      driver: syslog
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      TZ: Asia/Tokyo
    volumes:
      - ./data:/app/data
      - ./html:/app/html
    entrypoint: ["/opt/venv/bin/python"]
    command: ["/app/save_new_books.py"]
    restart: "no"
