<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-0T7M4RDQJ0"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-0T7M4RDQJ0');

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books</title>
<style>
:root {
    --bg: #f5f7fa;
    --surface: #ffffff;
    --text: #222;
    --muted: #666;
    --line: #d7dde5;
    --shadow: 0 4px 12px rgba(0,0,0,0.08);

    --today-bg: #fff8e1;
    --today-line: #f4b400;
    --today-text: #8a4b00;

    --accent: #ff9800;
    --accent-hover: #f57c00;
}

* {
    box-sizing: border-box;
}

html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: sans-serif;
    background: var(--bg);
    color: var(--text);
}

.top-status {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
}

.top-status-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
}

.status-badge {
    flex: 0 0 auto;
    font-size: 13px;
    font-weight: 700;
    color: var(--today-text);
    background: var(--today-bg);
    border: 1px solid var(--today-line);
    border-radius: 999px;
    padding: 6px 12px;
}

.status-text {
    font-size: 14px;
    color: var(--muted);
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.container {
    max-width: 1200px;
    margin: 24px auto 40px;
    padding: 0 20px 80px;
}

.sentinel {
    height: 24px;
    width: 100%;
}

.date-section {
    margin-bottom: 56px;
    scroll-margin-top: 76px;
}

.date-section-inner {
    padding: 0;
    border-radius: 16px;
}

.date-section.is-today .date-section-inner {
    background: var(--today-bg);
    border: 2px solid var(--today-line);
    padding: 18px 18px 22px;
    box-shadow: 0 8px 20px rgba(244, 180, 0, 0.12);
}

.date-title {
    font-size: 22px;
    font-weight: 800;
    margin: 32px 0 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid #333;
    color: var(--text);
}

.date-section.is-today .date-title {
    margin-top: 0;
    color: var(--today-text);
    border-bottom-color: var(--today-line);
}

.date-subtitle {
    margin: -8px 0 18px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.5;
}

.date-section.is-today .date-subtitle {
    color: #6d5a2d;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 30px;
    max-width: calc(180px * 4 + 30px * 3);
    margin: 0 auto;
}

.card {
    min-width: 0;
}

.image-wrapper {
    position: relative;
    height: 218px;
    display: flex;
    align-items: stretch;
    justify-content: center;
    background: white;
    border-radius: 10px;
    box-shadow: var(--shadow);
    overflow: hidden;
}

.date-section.is-today .image-wrapper {
    box-shadow: 0 6px 18px rgba(0,0,0,0.14);
    border: 1px solid rgba(244, 180, 0, 0.35);
}

.image-link {
    display: flex;
    width: 100%;
    height: 100%;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: inherit;
}

.image-link:hover .book-image,
.image-link:focus-visible .book-image {
    transform: scale(1.03);
}

.image-link:focus-visible {
    outline: 3px solid #005fcc;
    outline-offset: -3px;
}

.book-image {
    max-height: 218px;
    max-width: 100%;
    height: auto;
    width: auto;
    transition: transform 0.18s ease;
}

/* PC用: 画像上オーバーレイ */
.image-share-button {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 48px;
    height: 48px;
    border: none;
    background: transparent;
    padding: 0;
    cursor: pointer;
    z-index: 3;
    touch-action: manipulation;
}

.image-share-button::before {
    content: "";
    position: absolute;
    inset: 6px;
    background: #000;
    border-radius: 999px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    transition: transform 0.15s ease;
}

.image-share-button:hover::before,
.image-share-button:focus-visible::before {
    transform: scale(1.06);
}

.image-share-button:active::before {
    transform: scale(0.96);
}

.image-share-button img {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 22px;
    height: 22px;
    transform: translate(-50%, -50%);
    z-index: 1;
}

/* スマホ用: タイトル行の右側 */
.card-header {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-top: 10px;
}

.card-text {
    min-width: 0;
    flex: 1 1 auto;
}

.inline-share-button {
    flex: 0 0 auto;
    width: 48px;
    height: 48px;
    border: none;
    background: #000;
    color: #fff;
    border-radius: 999px;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    touch-action: manipulation;
}

.inline-share-button img {
    width: 22px;
    height: 22px;
}

.inline-share-button:hover,
.inline-share-button:focus-visible {
    transform: scale(1.06);
}

.inline-share-button:active {
    transform: scale(0.96);
}

.image-share-button:focus-visible,
.inline-share-button:focus-visible,
.today-fab:focus-visible,
.title:focus-visible,
.author:focus-visible {
    outline: 3px solid #005fcc;
    outline-offset: 2px;
}

.title,
.author {
    display: block;
    text-decoration: none;
    color: inherit;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.5;
    min-width: 0;
    word-break: break-word;
}

.author {
    margin-top: 6px;
    font-size: 12px;
    color: #777;
}

.title:hover,
.author:hover,
.title:focus-visible,
.author:focus-visible {
    text-decoration: underline;
    color: #000;
}

.loader {
    min-height: 80px;
    text-align: center;
    padding: 20px 20px 40px;
    color: #777;
    font-size: 14px;
}

.today-fab {
    position: fixed;
    right: 20px;
    bottom: 20px;
    z-index: 1100;
    width: 72px;
    height: 72px;
    border: none;
    border-radius: 999px;
    background: var(--accent);
    color: white;
    box-shadow: 0 10px 24px rgba(0,0,0,0.22);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    font-weight: 700;
    line-height: 1.1;
}

.today-fab:hover {
    background: var(--accent-hover);
}

.today-fab .icon {
    font-size: 20px;
}

.today-fab .label {
    font-size: 12px;
}

@media (max-width: 640px) {
    .container {
        margin-top: 18px;
        padding-left: 14px;
        padding-right: 14px;
    }

    .top-status-inner {
        padding-left: 14px;
        padding-right: 14px;
    }

    .date-title {
        font-size: 20px;
    }

    .grid {
        gap: 22px;
    }

    .today-fab {
        right: 14px;
        bottom: 14px;
        width: 68px;
        height: 68px;
    }

    .image-share-button {
        display: none;
    }

    .inline-share-button {
        display: inline-flex;
    }
}

@media (min-width: 641px) {
    .inline-share-button {
        display: none;
    }

    .image-share-button {
        display: block;
    }
}
</style>
</head>
<body>

<header class="top-status" aria-label="現在位置">
    <div class="top-status-inner">
        <div class="status-badge" id="status-badge">📅 今日</div>
        <div class="status-text" id="status-text">読み込み中...</div>
    </div>
</header>

<div class="container">
    <div id="top-sentinel" class="sentinel" aria-hidden="true"></div>
    <div id="book-container"></div>
</div>

<div class="loader" id="loader" aria-live="polite">Loading...</div>

<button id="todayBtn" class="today-fab" type="button" aria-label="今日発売の場所へ戻る">
    <span class="icon" aria-hidden="true">📅</span>
    <span class="label">今日</span>
</button>

<script>
const TODAY = "{{ today }}";
let nextDate = TODAY;
let prevDate = "{{ yesterday }}";
let loadingNext = false;
let loadingPrev = false;
let nextLoadFailed = false;
const IS_OWNER_HOST = {{ "true" if is_owner_host else "false" }};
const AMAZON_AFFILIATE_TAG = "{{ amazon_affiliate_tag }}";

function buildAmazonUrl(asin, withAffiliateTag = false) {
    let url = `https://www.amazon.co.jp/dp/${encodeURIComponent(asin)}`;
    if (withAffiliateTag && AMAZON_AFFILIATE_TAG) {
        url += `/ref=nosim?tag=${encodeURIComponent(AMAZON_AFFILIATE_TAG)}`;
    }
    return url;
}

function isMobileOrTablet() {
    const ua = navigator.userAgent.toLowerCase();
    return /iphone|ipad|ipod|android/.test(ua);
}

function shareOnTwitter(text, url) {
    const body = `${text} ${url}`;
    if (isMobileOrTablet()) {
        window.location.href = `twitter://post?message=${encodeURIComponent(body)}`;
    } else {
        window.open(
            `https://twitter.com/intent/tweet?text=${encodeURIComponent(body)}`,
            "_blank",
            "noopener,noreferrer"
        );
    }
}

document.body.addEventListener("click", (event) => {
    const btn = event.target.closest(".image-share-button, .inline-share-button");
    if (!btn) return;

    event.preventDefault();
    event.stopPropagation();

    const text = btn.dataset.text;
    const url = btn.dataset.url;
    shareOnTwitter(text, url);
});

function formatDateLabel(dateStr) {
    if (dateStr === TODAY) {
        return `📅 今日発売 (${dateStr})`;
    }
    return dateStr;
}

function createShareButton(className, titleText, shareUrl) {
    const shareBtn = document.createElement("button");
    shareBtn.className = className;
    shareBtn.dataset.text = titleText;
    shareBtn.dataset.url = shareUrl;
    shareBtn.type = "button";
    shareBtn.setAttribute("aria-label", `${titleText} を X で共有`);

    const logo = document.createElement("img");
    logo.src = "/static/X-logo.svg";
    logo.alt = "";
    shareBtn.appendChild(logo);

    return shareBtn;
}

function createSection(books, currentDate) {
    const section = document.createElement("section");
    section.className = "date-section";
    section.dataset.date = currentDate;

    const isToday = currentDate === TODAY;
    if (isToday) {
        section.classList.add("is-today");
        section.id = "today-section";
        section.setAttribute("aria-label", `今日発売 ${currentDate}`);
    } else {
        section.setAttribute("aria-label", `${currentDate} 発売`);
    }

    const inner = document.createElement("div");
    inner.className = "date-section-inner";

    const title = document.createElement("div");
    title.className = "date-title";
    title.textContent = formatDateLabel(currentDate);
    inner.appendChild(title);

    if (isToday) {
        const subtitle = document.createElement("div");
        subtitle.className = "date-subtitle";
        subtitle.textContent = "ここが今日発売の本です。右下の「今日」ボタンでいつでもこの位置へ戻れます。";
        inner.appendChild(subtitle);
    }

    const grid = document.createElement("div");
    grid.className = "grid";

    books.forEach(book => {
    const productUrl = buildAmazonUrl(book.asin, !IS_OWNER_HOST);
    const shareUrl = buildAmazonUrl(book.asin, IS_OWNER_HOST);

        const card = document.createElement("article");
        card.className = "card";

        const imgWrapper = document.createElement("div");
        imgWrapper.className = "image-wrapper";

        const imageLink = document.createElement("a");
        imageLink.href = productUrl;
        imageLink.target = "_blank";
        imageLink.rel = "noopener noreferrer";
        imageLink.className = "image-link";
        imageLink.setAttribute("aria-label", `${book.title} の Amazon ページを開く`);

        const img = document.createElement("img");
        img.src = book.image;
        img.loading = "lazy";
        img.alt = `${book.title} の表紙`;
        img.className = "book-image";
        imageLink.appendChild(img);

        imgWrapper.appendChild(imageLink);
    imgWrapper.appendChild(createShareButton("image-share-button", book.title, shareUrl));

        const cardHeader = document.createElement("div");
        cardHeader.className = "card-header";

        const cardText = document.createElement("div");
        cardText.className = "card-text";

        const titleLink = document.createElement("a");
        titleLink.href = productUrl;
        titleLink.target = "_blank";
        titleLink.rel = "noopener noreferrer";
        titleLink.textContent = book.title;
        titleLink.className = "title";

        const authorLink = document.createElement("a");
        authorLink.href = productUrl;
        authorLink.target = "_blank";
        authorLink.rel = "noopener noreferrer";
        authorLink.textContent = book.author;
        authorLink.className = "author";

        cardText.appendChild(titleLink);
        cardText.appendChild(authorLink);

        cardHeader.appendChild(cardText);
    cardHeader.appendChild(createShareButton("inline-share-button", book.title, shareUrl));

        card.appendChild(imgWrapper);
        card.appendChild(cardHeader);

        grid.appendChild(card);
    });

    inner.appendChild(grid);
    section.appendChild(inner);

    return section;
}

function appendBooks(books, currentDate, prepend = false) {
    if (!books.length) return;

    const container = document.getElementById("book-container");

    if (container.querySelector(`[data-date="${CSS.escape(currentDate)}"]`)) {
        return;
    }

    const section = createSection(books, currentDate);

    if (prepend) {
        container.prepend(section);
    } else {
        container.appendChild(section);
    }

    observeSection(section);
    updateStatusByViewport();
}

async function fetchBooks(date, direction) {
    const res = await fetch(`/api/books?date=${encodeURIComponent(date)}&direction=${encodeURIComponent(direction)}`);
    if (!res.ok) {
        throw new Error("Network response was not ok");
    }
    return await res.json();
}

async function loadNext() {
    const loader = document.getElementById("loader");
    if (!nextDate || loadingNext || nextLoadFailed) return;

    loadingNext = true;
    loader.innerText = "Loading...";

    try {
        const data = await fetchBooks(nextDate, "next");
        appendBooks(data.books, data.current_date, false);
        nextDate = data.next_date;

        if (!nextDate) {
            loader.innerText = "これより先の発売予定はありません";
            observerNext.unobserve(loader);
        } else {
            loader.innerText = "Loading...";
        }
    } catch (err) {
        console.error("Error loading next books:", err);
        nextLoadFailed = true;
        loader.innerText = "未来方向の読み込みに失敗しました";
        observerNext.unobserve(loader);
    } finally {
        loadingNext = false;
    }
}

async function loadPrev() {
    if (!prevDate || loadingPrev) return;

    loadingPrev = true;
    try {
        const beforeHeight = document.documentElement.scrollHeight;
        const beforeTop = window.scrollY;

        const data = await fetchBooks(prevDate, "prev");
        appendBooks(data.books, data.current_date, true);
        prevDate = data.next_date;

        const afterHeight = document.documentElement.scrollHeight;
        const delta = afterHeight - beforeHeight;
        window.scrollTo(0, beforeTop + delta);
    } catch (err) {
        console.error("Error loading previous books:", err);
    } finally {
        loadingPrev = false;
    }
}

async function ensureScrollable() {
    while (document.body.scrollHeight <= window.innerHeight && nextDate && !nextLoadFailed) {
        await loadNext();
    }
}

async function ensureTodayVisible() {
    const todaySection = document.getElementById("today-section");
    if (!todaySection) {
        await loadNext();
    }
    const el = document.getElementById("today-section");
    if (el) {
        el.scrollIntoView({ behavior: "auto", block: "start" });
    }
    updateStatusByViewport();
}

document.getElementById("todayBtn").addEventListener("click", async () => {
    let el = document.getElementById("today-section");
    if (!el) {
        await ensureTodayVisible();
        el = document.getElementById("today-section");
    }
    if (el) {
        el.scrollIntoView({ behavior: "smooth", block: "start" });
    }
});

const observerNext = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting && !nextLoadFailed) {
        loadNext();
    }
}, {
    root: null,
    rootMargin: "300px 0px",
    threshold: 0
});

const observerPrev = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting) {
        loadPrev();
    }
}, {
    root: null,
    rootMargin: "300px 0px",
    threshold: 0
});

observerNext.observe(document.getElementById("loader"));
observerPrev.observe(document.getElementById("top-sentinel"));

let visibleSections = new Map();
let sectionObserver = null;

function observeSection(section) {
    if (!sectionObserver) return;
    sectionObserver.observe(section);
}

function updateStatusByViewport() {
    const statusText = document.getElementById("status-text");
    const statusBadge = document.getElementById("status-badge");

    const sections = [...document.querySelectorAll(".date-section")];
    if (!sections.length) {
        statusText.textContent = "読み込み中...";
        return;
    }

    let current = null;

    if (visibleSections.size > 0) {
        const visible = [...visibleSections.values()]
            .sort((a, b) => Math.abs(a.top) - Math.abs(b.top));
        current = visible[0]?.element || null;
    }

    if (!current) {
        current = sections.find(sec => sec.getBoundingClientRect().top >= 0) || sections[sections.length - 1];
    }

    const currentDate = current?.dataset.date || "";
    if (!currentDate) {
        statusText.textContent = "読み込み中...";
        return;
    }

    if (currentDate === TODAY) {
        statusBadge.textContent = "📅 今日";
        statusText.textContent = `現在位置: 今日発売 (${currentDate})`;
    } else if (currentDate < TODAY) {
        statusBadge.textContent = "← 過去";
        statusText.textContent = `現在位置: ${currentDate} 発売（過去）`;
    } else {
        statusBadge.textContent = "未来 →";
        statusText.textContent = `現在位置: ${currentDate} 発売（未来）`;
    }
}

function setupSectionObserver() {
    sectionObserver = new IntersectionObserver((entries) => {
        for (const entry of entries) {
            const section = entry.target;
            if (entry.isIntersecting) {
                visibleSections.set(section.dataset.date, {
                    element: section,
                    top: entry.boundingClientRect.top
                });
            } else {
                visibleSections.delete(section.dataset.date);
            }
        }
        updateStatusByViewport();
    }, {
        root: null,
        threshold: [0, 0.15, 0.3, 0.5, 0.8]
    });
}

window.addEventListener("scroll", () => {
    updateStatusByViewport();
}, { passive: true });

window.addEventListener("resize", () => {
    updateStatusByViewport();
});

async function init() {
    setupSectionObserver();
    await loadNext();
    await ensureScrollable();
    updateStatusByViewport();
}

init();
</script>
</body>
</html>
