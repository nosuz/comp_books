<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-0T7M4RDQJ0"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-0T7M4RDQJ0');
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Books</title>
<meta property="og:title" content="{{ og_title }}">
<meta property="og:description" content="{{ og_description }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ request.url }}">
<meta property="og:image" content="{{ ogp_image_url }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:site_name" content="Books">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ og_title }}">
<meta name="twitter:description" content="{{ og_description }}">
<meta name="twitter:image" content="{{ ogp_image_url }}">

<link rel="stylesheet" href="{{ url_for('static', filename='books.css') }}">
</head>
<body>

<header class="top-status" aria-label="現在位置">
    <div class="top-status-inner">
        <div class="status-badge" id="status-badge">📅 今日</div>
        <div class="status-text" id="status-text">読み込み中...</div>
    </div>
</header>

<div class="container">
    <div id="book-container"></div>
</div>

<div class="loader" id="loader" aria-live="polite">Loading...</div>

<button id="todayBtn" class="today-fab" type="button" aria-label="今日発売の場所へ戻る">
    <span class="icon" aria-hidden="true">📅</span>
    <span class="label">今日</span>
</button>

<script>
window.APP_CONFIG = {
    today: "{{ today }}",
    yesterday: "{{ yesterday }}",
    timezoneName: "{{ timezone_name }}",
    isOwnerHost: {{ "true" if is_owner_host else "false" }},
    amazonAffiliateTag: "{{ amazon_affiliate_tag }}"
};
</script>
<script src="{{ url_for('static', filename='books.js') }}"></script>
</body>
</html>
